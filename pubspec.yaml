name: tiviplayer
description: "Android-first Xtream-compatible player base for TV and mobile."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  flutter_riverpod: ^3.3.1
  freezed_annotation: ^3.1.0
  go_router: ^17.1.0
  json_annotation: ^4.11.0
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^10.0.0
  video_player: ^2.11.1
  screen_brightness: ^2.1.7

dev_dependencies:
  build_runner: ^2.13.1
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  json_serializable: ^6.13.1
  video_player_platform_interface: ^6.6.0

dependency_overrides:
  video_player_android:
    path: third_party/video_player_android

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
